version: "3.9"

services:
  api:
    build: .
    container_name: deepsequence-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: deepsequence-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
